<section class="login-page">
  <div class="login-card">
    <h1>Hi</h1>

    <form [formGroup]="loginForm" (ngSubmit)="submit()" novalidate>
      <label class="input-row" [class.invalid]="hasError('email', 'required') || hasError('email', 'email')">
        <span class="input-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M3 5h18a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1zm0 2v.5l9 6 9-6V7H3zm18 11V9.94l-8.43 5.62a1 1 0 0 1-1.14 0L3 9.94V18h18z"/></svg>
        </span>
        <div class="input-content">
          <span class="input-label">Email*</span>
          <input type="email" formControlName="email" autocomplete="username">
        </div>
      </label>
      <p class="field-error" *ngIf="hasError('email', 'required')">Email is required.</p>
      <p class="field-error" *ngIf="hasError('email', 'email')">Enter a valid email address or use admin.</p>

      <label class="input-row" [class.invalid]="hasError('password', 'required')">
        <span class="input-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M7 10a5 5 0 1 1 9.9 1H20a2 2 0 0 1 2 2v2h-2v3h-2v-3h-2v3h-2v-3h-1.1A5 5 0 0 1 7 10zm5-3a3 3 0 0 0-2.82 4H15a3 3 0 0 0-3-4zM7 12a3 3 0 0 0 0 6h3v-2H7a1 1 0 1 1 0-2h3v-2H7z"/></svg>
        </span>
        <div class="input-content">
          <span class="input-label">Password*</span>
          <input [type]="showPassword() ? 'text' : 'password'" formControlName="password" autocomplete="current-password">
        </div>
        <button type="button" class="visibility-toggle" (click)="togglePasswordVisibility()" aria-label="Toggle password visibility">
          <svg viewBox="0 0 24 24"><path d="M12 5c5.5 0 9.27 4.11 10.6 6.02a1.63 1.63 0 0 1 0 1.96A17.6 17.6 0 0 1 18.73 17l1.42 1.42-1.41 1.41L4.17 5.24 5.58 3.83 8 6.25A11.8 11.8 0 0 1 12 5zm0 2a9.69 9.69 0 0 0-2.29.28l1.75 1.75A3.94 3.94 0 0 1 15 12c0 .66-.17 1.28-.46 1.82l2.72 2.72a15.78 15.78 0 0 0 3.67-4.54C19.86 10.56 16.76 7 12 7zm-6.67.85 2.17 2.17A3.94 3.94 0 0 0 9 12c0 2.21 1.79 4 4 4 .69 0 1.34-.17 1.9-.48l1.45 1.45c-1.23.65-2.7 1.03-4.35 1.03-4.76 0-7.86-3.56-8.93-5 .51-.69 1.29-1.65 2.26-2.65z"/></svg>
        </button>
      </label>
      <p class="field-error" *ngIf="hasError('password', 'required')">Password is required.</p>
      <p class="field-error server-error" *ngIf="serverError()">{{ serverError() }}</p>

      <button class="login-button" type="submit" [disabled]="loginForm.invalid || isSubmitting()">
        <span *ngIf="!isSubmitting()">LOGIN</span>
        <span *ngIf="isSubmitting()">LOGGING IN...</span>
      </button>
    </form>
  </div>
</section>
